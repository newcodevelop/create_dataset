serviceAccountName: "gdr"
namespace: wca-core-training
jobName:  sd-merge-regmean-v2
priority: "high-priority"
customLabels:
  - key: "project-name"
    value: "wca4z"
# https://github.com/foundation-model-stack/base-images/pkgs/container/base
#containerImage: ghcr.io/foundation-model-stack/base:pytorch-compile-latest-nightly-20250129
#containerImage: ghcr.io/foundation-model-stack/base:pytorch-compile-latest-nightly-20250105
containerImage: icr.io/swe-agent/pytorch-base:2.7cu128
# containerImage: us.icr.io/cil15-shared-registry/wca4z/torch:2.5.1cu126-devel-ubuntu
# containerImage: pytorch/pytorch:2.7.1-cuda12.8-cudnn9-devel
